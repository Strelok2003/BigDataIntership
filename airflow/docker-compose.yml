services:
  airflow:
    build: .
    container_name: airflow
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./simple_auth_manager_passwords.json.generated:/opt/airflow/simple_auth_manager_passwords.json.generated
      - ./Data/raw:/opt/airflow/Data/raw
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW_CONN_FS_DEFAULT={
          "conn_type":"fs",
          "extra":{
              "path":"/opt/airflow/Data/raw"
          }
        }
      - AIRFLOW_CONN_MONGO_CONN=mongo://airflow_user:airflow_pass@mongo:27017/my_database?authSource=admin
    command: bash -c "mkdir -p /opt/airflow/Data/tmp /opt/airflow/Data/cleaned && airflow db migrate && airflow standalone"
  
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: airflow_user
      MONGO_INITDB_ROOT_PASSWORD: airflow_pass
      MONGO_INITDB_DATABASE: my_database